<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GymTracker - Tu Registro de Entrenamiento</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- ChartJS -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.7)),
                  url("https://images.unsplash.com/photo-1534438327276-14e5300c3a48");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: #e2e8f0;
      min-height: 100vh;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(15px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .fade {
      animation: fadeIn 0.5s ease-out;
    }

    .hidden {
      display: none !important;
    }

    /* Cards de músculos - ENCUADRADAS Y CON IMAGEN */
    .muscle-card {
      position: relative;
      height: 240px;
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
      border: 2px solid rgba(59, 130, 246, 0.2);
    }

    .muscle-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 50px rgba(59, 130, 246, 0.3);
      border-color: rgba(59, 130, 246, 0.6);
    }

    .muscle-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
    }

    .muscle-card:hover img {
      transform: scale(1.08);
    }

    .muscle-card .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.65) 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .muscle-card:hover .overlay {
      background: linear-gradient(180deg, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.75) 100%);
    }

    .muscle-card h3 {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: white;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
    }

    /* Botones profesionales */
    .btn-primary {
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      color: white;
      padding: 12px 24px;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(59, 130, 246, 0.4);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-success {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: white;
      padding: 14px 28px;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      width: 100%;
      box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
    }

    .btn-success:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(16, 185, 129, 0.4);
    }

    .btn-danger {
      background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
      color: white;
      padding: 6px 12px;
      border: none;
      border-radius: 6px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 0.875rem;
    }

    .btn-danger:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
    }

    /* Ejercicios */
    .exercise-item {
      background: linear-gradient(135deg, rgba(30, 41, 59, 0.85), rgba(15, 23, 42, 0.85));
      padding: 16px;
      border-radius: 12px;
      border-left: 4px solid #3b82f6;
      transition: all 0.3s ease;
      cursor: pointer;
      border: 1px solid rgba(148, 163, 184, 0.2);
      backdrop-filter: blur(10px);
    }

    .exercise-item:hover {
      transform: translateX(6px);
      background: linear-gradient(135deg, rgba(30, 41, 59, 0.95), rgba(15, 23, 42, 0.95));
      border-color: rgba(59, 130, 246, 0.4);
      box-shadow: 0 8px 20px rgba(59, 130, 246, 0.15);
    }

    .exercise-item b {
      font-weight: 700;
      font-size: 1.05rem;
      color: #f1f5f9;
    }

    /* Tabla mejorada */
    table {
      background: rgba(15, 23, 42, 0.7);
      border-collapse: collapse;
      backdrop-filter: blur(10px);
    }

    thead {
      background: rgba(30, 41, 59, 0.95);
      border-bottom: 2px solid rgba(59, 130, 246, 0.3);
    }

    th {
      padding: 16px;
      text-align: left;
      font-weight: 700;
      color: #cbd5e1;
      font-size: 0.9rem;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    td {
      padding: 14px 16px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.1);
      color: #e2e8f0;
    }

    tbody tr:hover {
      background: rgba(59, 130, 246, 0.08);
    }

    td[contenteditable="true"] {
      background: rgba(59, 130, 246, 0.15);
      border-radius: 6px;
      cursor: text;
      transition: all 0.2s ease;
    }

    td[contenteditable="true"]:focus {
      background: rgba(59, 130, 246, 0.25);
      outline: 2px solid rgba(59, 130, 246, 0.4);
    }

    /* Header */
    .header-title {
      font-size: 2.5rem;
      font-weight: 800;
      color: white;
      margin-bottom: 8px;
      letter-spacing: -1px;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
    }

    .header-subtitle {
      color: #cbd5e1;
      font-size: 1.05rem;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    /* Inputs */
    input[type="text"],
    input[type="email"],
    input[type="password"],
    input[type="date"],
    input[type="number"] {
      background: rgba(30, 41, 59, 0.85);
      border: 2px solid rgba(148, 163, 184, 0.2);
      color: white;
      padding: 12px 16px;
      border-radius: 10px;
      font-family: inherit;
      font-size: 1rem;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }

    input::placeholder {
      color: rgba(148, 163, 184, 0.5);
    }

    input:focus {
      outline: none;
      border-color: rgba(59, 130, 246, 0.6);
      background: rgba(30, 41, 59, 0.95);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    /* Card Login */
    .login-card {
      background: rgba(30, 41, 59, 0.85);
      backdrop-filter: blur(20px);
      border: 2px solid rgba(148, 163, 184, 0.2);
    }

    .login-card:hover {
      border-color: rgba(59, 130, 246, 0.4);
    }

    /* Custom scrollbar */
.custom-scroll::-webkit-scrollbar {
  width: 6px;
}

.custom-scroll::-webkit-scrollbar-track {
  background: rgba(30, 41, 59, 0.5);
  border-radius: 10px;
}

.custom-scroll::-webkit-scrollbar-thumb {
  background: rgba(59, 130, 246, 0.5);
  border-radius: 10px;
}

.custom-scroll::-webkit-scrollbar-thumb:hover {
  background: rgba(59, 130, 246, 0.8);
}
  </style>

</head>

<body class="text-white min-h-screen font-sans">

  <!-- ================= LOGIN ================= -->
  <div id="auth" class="flex items-center justify-center min-h-screen px-4 fade">
    <div class="w-full max-w-md">
      <div class="login-card p-8 rounded-2xl shadow-2xl">
        
        <!-- Title -->
        <div class="text-center mb-8">
          <h1 class="header-title text-4xl mb-2">GymTracker</h1>
          <p class="header-subtitle text-base">Registra tu progreso, alcanza tus metas</p>
        </div>

        <!-- Form -->
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-semibold text-slate-300 mb-2">Email</label>
            <input id="email"
              type="email"
              placeholder="tu@email.com"
              class="w-full">
          </div>

          <div>
            <label class="block text-sm font-semibold text-slate-300 mb-2">Contraseña</label>
            <input id="password"
              type="password"
              placeholder="••••••••"
              class="w-full">
          </div>

          <button onclick="login()" class="btn-primary w-full py-3 text-base font-semibold mt-6">
            Iniciar Sesión
          </button>
        </div>

        <hr class="my-6 border-slate-700">
        
        <p class="text-center text-slate-400 text-sm">
          Comienza tu transformación hoy
        </p>
      </div>
    </div>
  </div>

<!-- ================= MUSCULOS ================= -->
<div id="musculosVista" class="hidden fade px-8 py-12">
  <div class="max-w-7xl mx-auto">
    
    <!-- Header -->
    <div class="mb-12 flex justify-between items-center">
      <div>
        <h2 class="header-title text-4xl mb-3">Selecciona un músculo</h2>
        <p class="header-subtitle text-lg">Comienza tu sesión de entrenamiento</p>
      </div>
      <button onclick="verCalendario()" class="btn-primary flex items-center gap-2">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
          <line x1="16" y1="2" x2="16" y2="6"></line>
          <line x1="8" y1="2" x2="8" y2="6"></line>
          <line x1="3" y1="10" x2="21" y2="10"></line>
        </svg>
        Calendario
      </button>
    </div>

    <!-- Grid de Músculos - SE GENERA DESDE JAVASCRIPT -->
    <div id="musculos" class="grid grid-cols-2 md:grid-cols-3 gap-6 mb-12">
    </div>
  </div>
</div>

  <!-- ================= EJERCICIOS ================= -->
  <div id="ejerciciosVista" class="hidden fade px-8 py-12">
    <div class="max-w-5xl mx-auto">
      
      <!-- Header -->
      <div class="flex justify-between items-center mb-8">
        <div>
          <h2 id="tituloMusculo" class="header-title text-3xl mb-2"></h2>
          <p class="header-subtitle">Administra tus ejercicios</p>
        </div>
        <button onclick="volverMusculos()" class="btn-primary">← Volver</button>
      </div>

      <!-- Lista de Ejercicios -->
      <div id="listaEjercicios" class="space-y-4 mb-8"></div>

      <!-- Crear Nuevo -->
      <button onclick="crearEjercicio()" class="btn-success">
        + Nuevo ejercicio
      </button>
    </div>
  </div>

  <!-- ================= SERIES ================= -->
  <div id="seriesVista" class="hidden fade px-8 py-12">
    <div class="max-w-5xl mx-auto">
      
      <!-- Header -->
      <div class="flex justify-between items-center mb-8">
        <div>
          <h2 id="tituloEjercicio" class="header-title text-3xl mb-2"></h2>
          <p class="header-subtitle">Registra tus series</p>
        </div>
        <button onclick="volverEjercicios()" class="btn-primary">← Volver</button>
      </div>

      <!-- Tabla de Series -->
      <div class="rounded-xl overflow-hidden border border-slate-700 mb-8">
        <table class="w-full">
          <thead>
            <tr>
              <th>#</th>
              <th>Reps</th>
              <th>Peso (kg)</th>
              <th>RIR</th>
              <th>Acción</th>
            </tr>
          </thead>
          <tbody id="tablaSeries"></tbody>
        </table>
      </div>

      <!-- Agregar Serie -->
      <button onclick="agregarSerie()" class="btn-success">
        + Agregar serie
      </button>
    </div>
  </div>

  <!-- ================= CALENDARIO ================= -->
  <div id="calendarioVista" class="hidden fade px-8 py-12">
    <div class="max-w-5xl mx-auto">
      
      <div class="flex justify-between items-center mb-8">
        <div>
          <h2 class="header-title text-3xl mb-2">Calendario</h2>
          <p class="header-subtitle">Tu historial de entrenamientos</p>
        </div>
        <button onclick="volverMusculos()" class="btn-primary">← Volver</button>
      </div>

      <div class="bg-black/60 p-8 rounded-2xl border border-slate-700 backdrop-filter backdrop-blur-lg">
        <div id="calendario" class="grid grid-cols-7 gap-2 text-center"></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
